name: Update Public Repo Traffic

on:
  schedule:
    - cron: "20 1 * * *" # 每天 UTC 01:20
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-traffic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run traffic collector
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          GH_USER: DianxingShi
          README_PATH: README.md
        run: |
          python scripts/update_traffic.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update public repo traffic stats"
            git push
          fi

name: Update Public Repo Traffic

on:
  schedule:
    - cron: "20 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-traffic:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Run traffic collector
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          GH_USER: DianxingShi
          README_PATH: README.md
        run: |
          python -V
          python scripts/update_traffic.py

      - name: Commit and push safely
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore: update public repo traffic stats"

          # Avoid rebase conflicts on README by replaying commit on latest remote
          git fetch origin main
          git reset --hard origin/main
          python scripts/update_traffic.py
          git add README.md

          if git diff --cached --quiet; then
            echo "No changes after sync."
            exit 0
          fi

          git commit -m "chore: update public repo traffic stats"
          git push origin HEAD:main

name: Update Public Repo Traffic

on:
  schedule:
    - cron: "20 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-traffic:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
      GH_USER: DianxingShi
      README_PATH: README.md
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Debug traffic API (single repo)
        run: |
          REPO_NAME="your-repo-name"
          echo "Checking clones endpoint for DianxingShi/${REPO_NAME} ..."
          curl -i \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/DianxingShi/${REPO_NAME}/traffic/clones"

      - name: Run traffic collector
        run: |
          python -V
          python scripts/update_traffic.py

      - name: Commit and push
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore: update public repo traffic stats"

          git fetch origin main
          if ! git pull --rebase origin main; then
            echo "Rebase failed, aborting and skipping this run."
            git rebase --abort || true
            exit 0
          fi

          git push origin HEAD:main
